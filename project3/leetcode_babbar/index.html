<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- heading -->
         <h1>LeetMetric</h1>
         <!-- user -->
          <div class="user-container">
            <p>Enter your Username below!</p>
            <div class="user-input-container">
                <input type="text" placeholder="enter your username here" id="user-input">
                <button id="search-btn">Search</button>
            </div>
          </div>
          <!-- stats -->
           <div class="stats-container">
            <div class="progress">
                <div class="progress-item">
                    <div class="easy-progress circle">
                        <span id="easy-level ">easy-level</span>
                    </div>
                </div>

                <div class="progress-item">
                    <div class="medium-progress circle">
                        <span id="medium-level">medium-level</span>
                    </div>
                </div>

                <div class="progress-item">
                    <div class="hard-progress circle">
                        <span id="hard-level">hard-level</span>
                    </div>
                </div>
            
            </div>

            <div class="stats-card">

            </div>
           </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
